databases:
  - name: campaign-attribution-db
    plan: free
    databaseName: campaign_attribution
    user: campaign_user

services:
  - type: web
    name: campaign-attribution-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: ATTRIBUTION_WINDOW_HOURS
        value: "24"
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-attribution-db
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true
